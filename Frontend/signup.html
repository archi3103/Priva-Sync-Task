<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="container">
        <h1>Signup</h1>
        <form>
            <div class="input-box">
                <input name="username" id="username" placeholder="Username">
            </div>
            <div class="input-box">
                <input name="email" id="email" placeholder="Email-ID">
            </div>
            <div class="input-box">
                <input name="full_name" id="full_name" placeholder="Full name">
            </div>
            <div class="input-box">
                <input type="password" name="password" id="password" placeholder="Password">
            </div>
            <div class="input-box">
                <input type="password" name="confirm-password" id="confirm-password" placeholder="Confirm Password">
            </div>
            <div class="buttons">
                <button type="submit" id="signup-btn">Signup</button>
                <button type="login" id="login-btn">Login</button>
            </div>

        </form>
    </div>
    <script type="text/javascript" src="/Frontend/signup.js" defer></script>
</body>
</html>
