<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="container">
        <h1>Signup</h1>
        <form>
            <div class="input-box">
                <input type="text" name="username" id="username" placeholder="Username">
            </div>
            <div class="input-box">
                <input type="email" name="email" id="email" placeholder="Email-ID">
            </div>
            <div class="input-box">
                <input type="password" name="password" id="password" placeholder="Password">
            </div>
            <div class="input-box">
                <input type="password" name="repeat-password" id="repeat-password" placeholder="Confirm Password">
            </div>
            <button type="submit" id="signup-btn">Signup</button>
        </form>
    </div>
    <script type="test/javascript" src="/Frontend/signup.js"></script>
</body>
</html>
